<!DOCTYPE html>
<html>
<head>
  <title>Brawl Game</title>
  <style>
    canvas { background: #eee; }
  </style>
</head>
<body>
<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {x:200, y:200, size:20};
let bullets = [];
let enemy = {x:100, y:100, size:20};

let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

canvas.addEventListener("click", e => {
  bullets.push({x:player.x, y:player.y, dx:(e.offsetX-player.x)/10, dy:(e.offsetY-player.y)/10});
});

function update(){
  if(keys["w"]) player.y -= 3;
  if(keys["s"]) player.y += 3;
  if(keys["a"]) player.x -= 3;
  if(keys["d"]) player.x += 3;

  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;

    // 当たり判定
    if(Math.abs(b.x - enemy.x) < 20 && Math.abs(b.y - enemy.y) < 20){
      enemy.x = Math.random()*400;
      enemy.y = Math.random()*400;
    }
  });
}

function draw(){
  ctx.clearRect(0,0,400,400);

  // プレイヤー
  ctx.fillStyle = "blue";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // 敵
  ctx.fillStyle = "red";
  ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

  // 弾
  ctx.fillStyle = "black";
  bullets.forEach(b => ctx.fillRect(b.x, b.y, 5, 5));
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
