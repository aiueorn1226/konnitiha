<!DOCTYPE html>
<html>
<head>
  <title>Click Game</title>
</head>
<body>
  <h1>Score: <span id="score">0</span></h1>
  <button onclick="add()">Click!</button>

  <script>
    let score = 0;
    function add() {
      score++;
      document.getElementById("score").textContent = score;
    }
  </script>
</body>
</html>
